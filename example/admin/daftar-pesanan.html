<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar Pesanan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{display:flex;background:#F5F7FA;color:#1F2937}

/* SIDEBAR */
.sidebar{width:260px;height:100vh;background:#fff;padding:24px 16px;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;justify-content:space-between}
.logo{font-weight:700;color:#1E3A8A;font-size:20px}
.logo small{display:block;font-size:12px;color:#9CA3AF}
.menu{margin-top:30px}
.menu a{display:flex;padding:12px;border-radius:10px;text-decoration:none;color:#374151;margin-bottom:6px;font-size:14px}
.menu a.active{background:#1E3A8A;color:#fff;font-weight:600}
.logout{font-size:14px;color:#6B7280}

/* MAIN */
.main{flex:1;padding:24px}

/* TOPBAR STYLE */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.search{
  width:420px;
  background:#EEF2F7;
  border:none;
  padding:12px 16px;
  border-radius:999px;
}

.admin-box{
  display:flex;
  align-items:center;
  gap:12px;
}

.icon{
  width:20px;
  height:20px;
  cursor:pointer;
}

.admin-profile{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}

.admin-profile img{
  width:32px;
  height:32px;
  border-radius:50%;
  object-fit:cover;
}

/* CONTENT */
.title{font-size:30px;font-weight:700;color:#1E3A8A}
.subtitle{color:#6B7280;margin-top:6px;margin-bottom:20px}

.actions{display:flex;gap:10px}
.btn{padding:10px 16px;border-radius:999px;border:none;font-weight:600}
.btn.gray{background:#E5E7EB}
.btn.blue{background:#1E3A8A;color:#fff}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 10px 20px rgba(0,0,0,0.04)}
.card h4{font-size:12px;color:#9CA3AF}
.card h2{margin-top:8px;font-size:22px}

.table-box{background:#fff;border-radius:20px;padding:20px}

table{width:100%;border-collapse:collapse}
th,td{padding:14px;font-size:13px;text-align:left}
th{color:#9CA3AF}
tr{border-bottom:1px solid #F1F5F9}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <div class="logo">OMAH.ID <small>Dashboard Admin</small></div>
    <div class="menu">
      <a>Beranda</a>
      <a>Produk</a>
      <a class="active">Pesanan</a>
      <a>Custom Order</a>
      <a>Stok</a>
      <a>User</a>
    </div>
  </div>
  <div class="logout">Keluar</div>
</div>

<div class="main">

<!-- TOPBAR  -->
<div id="topbar"></div>

<div class="title">Daftar Pesanan</div>
<div class="subtitle">Kelola dan pantau seluruh transaksi furniture pelanggan.</div>

<div class="table-box">
<table>
<tr>
<th>ID</th>
<th>Pelanggan</th>
<th>Total</th>
</tr>

<tr>
<td>#001</td>
<td>Rinda</td>
<td>Rp 2.000.000</td>
</tr>

</table>
</div>

</div>

<!-- SCRIPT  -->
<script>
fetch('topbar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('topbar').innerHTML = data;
  });
</script>

</body>
</html>
